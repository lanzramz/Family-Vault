<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Family Vault">
<meta name="theme-color" content="#8B9E7A">

<title>Family Vault</title>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --cream: #FAF8F4;
    --cream-dark: #EDE9E0;
    --sage: #8B9E7A;
    --sage-dark: #6A7D5B;
    --sage-light: #E8EEE4;
    --gold: #C4956A;
    --gold-light: #F5EBE0;
    --gold-pale: #FDF8F3;
    --ink: #2C2A26;
    --ink-light: #6B6760;
    --ink-faint: #A8A49E;
    --white: #FFFFFF;
    --purple: #8A7AAF;
    --purple-light: #EEE8F8;
    --error: #D97B7B;
    --error-bg: #FDF0F0;
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    overflow: hidden;
    position: fixed;
    width: 100%;
  }

  #app {
    height: 100%;
    display: flex;
    flex-direction: column;
    background: var(--cream);
    max-width: 430px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
  }

  /* STATUS BAR AREA */
  .status-bar {
    height: calc(44px + var(--safe-top));
    padding-top: var(--safe-top);
    background: rgba(250,248,244,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--cream-dark);
    flex-shrink: 0;
    z-index: 50;
  }

  .status-bar-title {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: 0.01em;
  }

  /* SCROLL AREA */
  .page-scroll {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
  }

  .page-scroll::-webkit-scrollbar { display: none; }

  /* TAB BAR */
  .tab-bar {
    flex-shrink: 0;
    background: rgba(250,248,244,0.97);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--cream-dark);
    display: flex;
    padding-bottom: var(--safe-bottom);
    padding-top: 8px;
    z-index: 100;
  }

  .tab-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 4px 0 8px;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--ink-faint);
    transition: color 0.2s;
    font-family: 'DM Sans', sans-serif;
    -webkit-user-select: none;
    user-select: none;
  }

  .tab-item.active { color: var(--sage); }

  .tab-icon {
    font-size: 24px;
    line-height: 1;
    transition: transform 0.2s;
  }

  .tab-item.active .tab-icon {
    transform: scale(1.1);
  }

  .tab-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
  }

  .tab-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--sage);
    margin-top: -2px;
  }

  /* PAGES */
  .page { padding: 16px 16px 20px; animation: pageFade 0.25s ease; }

  @keyframes pageFade {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* CARDS */
  .card {
    background: var(--white);
    border-radius: 20px;
    padding: 18px;
    box-shadow: 0 2px 16px rgba(44,42,38,0.06);
    border: 1px solid var(--cream-dark);
    margin-bottom: 14px;
  }

  .card-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 14px;
  }

  /* SECTION HEADER */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 400;
    color: var(--ink);
    line-height: 1.2;
  }

  .section-title em {
    font-style: italic;
  }

  /* PILLS */
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* BUTTONS */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 18px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
    -webkit-user-select: none;
    user-select: none;
  }

  .btn:active { transform: scale(0.96); }

  .btn-sage { background: var(--sage); color: white; }
  .btn-gold { background: var(--gold); color: white; }
  .btn-purple { background: var(--purple); color: white; }
  .btn-ghost { background: var(--cream-dark); color: var(--ink-light); }

  /* FILTER PILLS ROW */
  .filter-row {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    margin-bottom: 18px;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }

  .filter-row::-webkit-scrollbar { display: none; }

  .filter-pill {
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    white-space: nowrap;
    cursor: pointer;
    border: none;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
    background: var(--cream-dark);
    color: var(--ink-light);
    -webkit-user-select: none;
    user-select: none;
  }

  .filter-pill.active { background: var(--sage); color: white; }
  .filter-pill.active-gold { background: var(--gold); color: white; }

  /* TIMELINE */
  .timeline-wrap { position: relative; padding-left: 8px; }
  .timeline-line {
    position: absolute;
    left: 20px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: linear-gradient(to bottom, var(--sage-light), transparent);
    border-radius: 2px;
  }

  .timeline-item { display: flex; gap: 12px; margin-bottom: 16px; }

  .timeline-dot {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: white;
    border: 3px solid var(--sage);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
    z-index: 1;
    box-shadow: 0 0 0 4px var(--sage-light);
    margin-top: 2px;
  }

  .timeline-card {
    flex: 1;
    background: white;
    border-radius: 16px;
    padding: 13px 14px;
    box-shadow: 0 2px 12px rgba(44,42,38,0.06);
    border: 1px solid var(--cream-dark);
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(44,42,38,0.5);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }

  .modal-sheet {
    background: white;
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-width: 430px;
    padding: 8px 20px calc(32px + var(--safe-bottom));
    max-height: 88vh;
    overflow-y: auto;
    animation: sheetUp 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    -webkit-overflow-scrolling: touch;
  }

  .modal-sheet::-webkit-scrollbar { display: none; }

  @keyframes sheetUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle {
    width: 36px;
    height: 4px;
    background: var(--cream-dark);
    border-radius: 2px;
    margin: 8px auto 16px;
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 21px;
    font-weight: 400;
    color: var(--ink);
  }

  .modal-close {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--cream-dark);
    border: none;
    cursor: pointer;
    font-size: 16px;
    color: var(--ink-light);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* FORMS */
  .form-group { margin-bottom: 14px; }

  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-light);
    margin-bottom: 6px;
    letter-spacing: 0.02em;
  }

  .form-input, .form-select, .form-textarea {
    width: 100%;
    border-radius: 12px;
    border: 1.5px solid var(--cream-dark);
    padding: 11px 13px;
    font-size: 14px;
    color: var(--ink);
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }

  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--sage);
  }

  .form-textarea { resize: vertical; min-height: 100px; line-height: 1.6; }

  /* DOCUMENT CARD */
  .doc-card {
    background: white;
    border-radius: 16px;
    padding: 14px 16px;
    box-shadow: 0 2px 10px rgba(44,42,38,0.05);
    border: 1px solid var(--cream-dark);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 13px;
  }

  .doc-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  /* LETTER CARD */
  .letter-card {
    background: white;
    border-radius: 18px;
    padding: 16px;
    border: 1px solid var(--cream-dark);
    box-shadow: 0 2px 12px rgba(44,42,38,0.05);
    margin-bottom: 12px;
    cursor: pointer;
    transition: transform 0.15s;
    -webkit-user-select: none;
    user-select: none;
  }

  .letter-card:active { transform: scale(0.98); }

  /* QUICK ACTION GRID */
  .qa-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .qa-btn {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
    padding: 14px;
    border-radius: 16px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: transform 0.15s;
    text-align: left;
    -webkit-user-select: none;
    user-select: none;
  }

  .qa-btn:active { transform: scale(0.96); }

  /* COUNTDOWN ITEM */
  .countdown-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--cream-dark);
  }

  .countdown-item:last-child { border-bottom: none; padding-bottom: 0; }
  .countdown-item:first-child { padding-top: 0; }

  .countdown-badge {
    width: 50px;
    height: 50px;
    border-radius: 14px;
    background: var(--sage-light);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .countdown-num {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--sage);
    line-height: 1;
  }

  .countdown-unit {
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--sage-dark);
    text-transform: uppercase;
  }

  /* MEMORY CARD */
  .memory-card {
    background: linear-gradient(135deg, var(--gold-pale), #FFF9F5);
    border: 1px solid #EDE0D4;
    border-radius: 20px;
    padding: 18px;
    margin-bottom: 14px;
  }

  /* FAMILY GRID */
  .family-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .family-member-card {
    background: var(--cream);
    border: 1.5px solid var(--cream-dark);
    border-radius: 16px;
    padding: 14px 12px;
    text-align: center;
  }

  /* PROGRESS BAR */
  .progress-bar {
    height: 4px;
    border-radius: 2px;
    background: var(--cream-dark);
    overflow: hidden;
    margin-top: 8px;
  }

  .progress-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(to right, var(--purple), #C4829A);
    transition: width 1s ease;
  }

  /* EXPIRY ALERT */
  .expiry-alert {
    background: #FDF8EC;
    border: 1.5px solid #E8D4A0;
    border-radius: 14px;
    padding: 12px 14px;
    margin-bottom: 14px;
  }

  /* INSTALL BANNER */
  .install-banner {
    background: linear-gradient(135deg, var(--sage), var(--sage-dark));
    border-radius: 16px;
    padding: 14px 16px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: calc(80px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: white;
    padding: 10px 20px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    z-index: 300;
    opacity: 0;
    transition: all 0.3s;
    white-space: nowrap;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>

// ─── PWA MANIFEST ────────────────────────────────────────────────────────────
(function() {
  const manifest = {
    name: "Family Vault",
    short_name: "Family Vault",
    description: "Family Milestone & Document Vault",
    start_url: "./",
    display: "standalone",
    background_color: "#FAF8F4",
    theme_color: "#8B9E7A",
    orientation: "portrait",
    icons: [
      { src: generateIcon(192), sizes: "192x192", type: "image/png", purpose: "any maskable" },
      { src: generateIcon(512), sizes: "512x512", type: "image/png", purpose: "any maskable" }
    ]
  };

  function generateIcon(size) {
    const c = document.createElement('canvas');
    c.width = size; c.height = size;
    const ctx = c.getContext('2d');
    const g = ctx.createLinearGradient(0, 0, size, size);
    g.addColorStop(0, '#8B9E7A');
    g.addColorStop(1, '#6A7D5B');
    ctx.fillStyle = g;
    const r = size * 0.22;
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(size - r, 0);
    ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size - r);
    ctx.quadraticCurveTo(size, size, size - r, size);
    ctx.lineTo(r, size);
    ctx.quadraticCurveTo(0, size, 0, size - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(0, 0, size, size * 0.4);
    ctx.fillStyle = 'white';
    ctx.font = `bold ${size * 0.42}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🌿', size / 2, size / 2);
    return c.toDataURL('image/png');
  }

  const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = url;
  document.head.appendChild(link);

  // Apple touch icon
  const iconUrl = generateIcon(180);
  const iconLink = document.createElement('link');
  iconLink.rel = 'apple-touch-icon';
  iconLink.href = iconUrl;
  document.head.appendChild(iconLink);
})();

// ─── SERVICE WORKER ───────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'family-vault-v1';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./', './index.html'])));
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))));
      self.clients.claim();
    });
    self.addEventListener('fetch', e => {
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match('./index.html'))));
    });
  `;
  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function daysUntil(dateStr) {
  const today = new Date(); today.setHours(0,0,0,0);
  const t = new Date(dateStr); t.setFullYear(today.getFullYear());
  if (t < today) t.setFullYear(today.getFullYear() + 1);
  return Math.ceil((t - today) / 86400000);
}

function fmtDate(d) {
  return new Date(d).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
}

function fmtDateShort(d) {
  return new Date(d).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}

function getMember(id) { return DB.family.find(m => m.id === id) || DB.family[0]; }

function expiryStatus(exp) {
  if (!exp) return null;
  const days = Math.ceil((new Date(exp) - new Date()) / 86400000);
  if (days < 0) return { label: 'Expired', color: '#D97B7B', bg: '#FDF0F0' };
  if (days <= 90) return { label: `Expires in ${days}d`, color: '#C49B4A', bg: '#FDF8EC' };
  return { label: `Valid · ${new Date(exp).getFullYear()}`, color: '#8B9E7A', bg: '#F0F4EE' };
}

function isUnlocked(l) { return new Date(l.unlocksAt) <= new Date(); }

function greeting() {
  const h = new Date().getHours();
  return h < 12 ? 'Good Morning' : h < 18 ? 'Good Afternoon' : 'Good Evening';
}

function todayMemory() {
  return DB.memories[Math.floor(Date.now() / 86400000) % DB.memories.length];
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── MODAL SYSTEM ─────────────────────────────────────────────────────────────
function openModal(type, id) {
  state.modal = { type, id };
  renderModal();
}

function closeModal() {
  state.modal = null;
  renderModal();
}

function renderModal() {
  const existing = document.getElementById('modalOverlay');
  if (existing) existing.remove();
  if (!state.modal) return;

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modalOverlay';
  overlay.onclick = e => { if (e.target === overlay) closeModal(); };

  const sheet = document.createElement('div');
  sheet.className = 'modal-sheet';

  const builders = {
    addMilestone: buildAddMilestoneModal,
    addDocument: buildAddDocumentModal,
    composeLetter: buildComposeLetterModal,
    viewLetter: buildViewLetterModal,
    family: buildFamilyModal,
  };

  sheet.innerHTML = builders[state.modal.type] ? builders[state.modal.type](state.modal.id) : '';
  overlay.appendChild(sheet);
  document.body.appendChild(overlay);
  attachModalEvents();
}

function modalHeader(title) {
  return `<div class="modal-handle"></div>
  <div class="modal-header">
    <h2 class="modal-title">${title}</h2>
    <button class="modal-close" onclick="closeModal()">✕</button>
  </div>`;
}

function formGroup(label, inputHtml) {
  return `<div class="form-group"><label class="form-label">${label}</label>${inputHtml}</div>`;
}

function selectHtml(id, options, value) {
  return `<select class="form-select" id="${id}">
    ${options.map(o => `<option value="${o.v}" ${o.v === value ? 'selected' : ''}>${o.l}</option>`).join('')}
  </select>`;
}

    ${formGroup('Family Member', selectHtml('doc-member', memberOpts, 'yael'))}
    ${formGroup('Category', selectHtml('doc-cat', catOpts, 'health'))}
    ${formGroup('Document Title', `<input class="form-input" id="doc-title" placeholder="e.g. Passport, Report Card">`)}
    ${formGroup('Issue Date', `<input class="form-input" id="doc-date" type="date" value="${today}">`)}
    ${formGroup('Expiry Date (optional)', `<input class="form-input" id="doc-expires" type="date">`)}
    <div style="background:var(--cream-dark);border-radius:14px;padding:14px;margin-bottom:14px;display:flex;align-items:center;gap:10px">
      <span style="font-size:24px">📎</span>
      <div>
        <div style="font-size:13px;font-weight:600;color:var(--ink)">Attach File</div>
        <div style="font-size:11px;color:var(--ink-faint)">PDF, JPG, PNG (coming in v2)</div>
      </div>
    </div>
    <button class="btn btn-gold" style="width:100%;justify-content:center;padding:13px" onclick="saveDocument()">◫ Save Document</button>`;
}

function buildComposeLetterModal() {
  const memberOpts = DB.family.filter(m => m.id !== 'all').map(m => ({ v: m.id, l: `${m.avatar} ${m.name}` }));
  const fromOpts = [{ v:'Nanay', l:'👩 Nanay' }, { v:'Tatay', l:'👨 Tatay' }];
  const future = new Date(); future.setFullYear(future.getFullYear() + 5);
  const futureStr = future.toISOString().split('T')[0];
  return `${modalHeader('Write a Letter')}
    ${formGroup('To', selectHtml('lt-to', memberOpts, 'yael'))}
    ${formGroup('From', selectHtml('lt-from', fromOpts, 'Nanay'))}
    ${formGroup('Subject', `<input class="form-input" id="lt-subject" placeholder="For your 18th Birthday...">`)}
    ${formGroup('Your Message', `<textarea class="form-textarea" id="lt-body" placeholder="Dear one, I want you to know..." style="min-height:140px;font-family:'Playfair Display',serif;font-style:italic"></textarea>`)}
    ${formGroup('Unlock Date', `<input class="form-input" id="lt-unlock" type="date" value="${futureStr}">`)}
    <div style="background:var(--purple-light);border-radius:12px;padding:12px;margin-bottom:14px;font-size:12px;color:var(--purple);line-height:1.6">
      🔒 This letter will be sealed and only readable after the unlock date you choose.
    </div>
    <button class="btn btn-purple" style="width:100%;justify-content:center;padding:13px" onclick="saveLetter()">✉ Seal & Save Letter</button>`;
}

function buildViewLetterModal(id) {
  const l = state.letters.find(x => x.id === id);
  if (!l) return '';
  const toM = getMember(l.to);
  return `${modalHeader('Letter Unlocked ✉')}
    <div style="background:var(--purple-light);border-radius:14px;padding:14px;margin-bottom:16px;display:flex;gap:10px;align-items:center">
      <span style="font-size:28px">💌</span>
      <div>
        <div style="font-family:'Playfair Display',serif;font-size:16px;color:var(--ink)">${l.subject}</div>
        <div style="font-size:11px;color:var(--ink-faint);margin-top:2px">From ${l.from} → ${toM.avatar} ${l.to} · Unlocked ${fmtDateShort(l.unlocksAt)}</div>
      </div>
    </div>
    <div style="background:var(--cream);border-radius:14px;padding:18px;font-family:'Playfair Display',serif;font-style:italic;font-size:15px;color:var(--ink-light);line-height:1.9;min-height:120px">
      ${l.body || '(No message written yet — it awaits you in silence.)'}
    </div>`;
}

function buildFamilyModal() {
  return `${modalHeader('Our Family')}
    ${DB.family.filter(m => m.id !== 'all').map(m => {
      const ms = state.milestones.filter(x => x.member === m.id).length;
      const docs = state.documents.filter(x => x.member === m.id).length;
      const letters = state.letters.filter(x => x.to === m.id).length;
      return `<div style="display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--cream-dark)">
        <div style="font-size:36px;width:50px;text-align:center">${m.avatar}</div>
        <div style="flex:1">
          <div style="font-size:16px;font-weight:700;color:var(--ink);margin-bottom:4px">${m.name}</div>
          <div style="display:flex;gap:12px">
            <div style="text-align:center">
              <div style="font-size:18px;font-weight:700;color:var(--sage)">${ms}</div>
              <div style="font-size:10px;color:var(--ink-faint);letter-spacing:0.05em">MILESTONES</div>
            </div>
            <div style="text-align:center">
              <div style="font-size:18px;font-weight:700;color:var(--gold)">${docs}</div>
              <div style="font-size:10px;color:var(--ink-faint);letter-spacing:0.05em">DOCUMENTS</div>
            </div>
            <div style="text-align:center">
              <div style="font-size:18px;font-weight:700;color:var(--purple)">${letters}</div>
              <div style="font-size:10px;color:var(--ink-faint);letter-spacing:0.05em">LETTERS</div>
            </div>
          </div>
        </div>
      </div>`;
    }).join('')}`;
}

// ─── SAVE ACTIONS ─────────────────────────────────────────────────────────────
function saveMilestone() {
  const title = document.getElementById('ms-title').value.trim();
  const date = document.getElementById('ms-date').value;
  if (!title || !date) { showToast('Please fill in title and date'); return; }

  state.milestones.unshift({
    id: Date.now(),
    member: document.getElementById('ms-member').value,
    category: document.getElementById('ms-cat').value,
    title,
    date,
    note: document.getElementById('ms-note').value || '',
    emoji: document.getElementById('ms-emoji').value || '🌟',
  });
  closeModal();
  showToast('✦ Milestone saved!');
  renderPage();
}

function saveDocument() {
  const title = document.getElementById('doc-title').value.trim();
  const date = document.getElementById('doc-date').value;
  if (!title || !date) { showToast('Please fill in title and date'); return; }

  state.documents.push({
    id: Date.now(),
    member: document.getElementById('doc-member').value,
    category: document.getElementById('doc-cat').value,
    title,
    date,
    expires: document.getElementById('doc-expires').value || null,
  });
  closeModal();
  showToast('◫ Document saved!');
  renderPage();
}

function saveLetter() {
  const subject = document.getElementById('lt-subject').value.trim();
  const unlocksAt = document.getElementById('lt-unlock').value;
  if (!subject || !unlocksAt) { showToast('Please fill in subject and unlock date'); return; }

  state.letters.push({
    id: Date.now(),
    to: document.getElementById('lt-to').value,
    from: document.getElementById('lt-from').value,
    subject,
    body: document.getElementById('lt-body').value,
    unlocksAt,
  });
  closeModal();
  showToast('✉ Letter sealed!');
  renderPage();
}

// ─── EVENT HELPERS ────────────────────────────────────────────────────────────
function setMilestoneFilter(f) { state.milestoneFilter = f; renderPage(); }
function setVaultFilter(f) { state.vaultFilter = f; renderPage(); }
function showFamilyModal() { openModal('family'); }

function attachPageEvents() {} // events are inline onclick
function attachModalEvents() {} // events are inline onclick

// ─── BOOT ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
